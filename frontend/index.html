<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Metro Clan War</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            l1: '#ED1C24', l2: '#93278F', l3: '#00A651',
            l4: '#FDB913', l5: '#005596', l7: '#B97D05', l9sud: '#F37021',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-900 text-white font-sans overflow-hidden">

<section id="view-quiz" class="h-screen flex flex-col p-6">
  <header class="py-6 text-center">
    <h1 class="text-3xl font-black">METRO <span class="text-l5">CLAN</span> WAR</h1>
    <p class="text-sm opacity-60 mt-2">Discover your underground faction</p>
  </header>

  <div id="quiz-container" class="flex-1 flex flex-col justify-center">
    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
      <span class="text-xs text-l5 uppercase font-bold tracking-widest">Question</span>
      <h2 class="text-xl font-bold mt-2 italic">Loading...</h2>
      <div class="grid gap-3 mt-6"></div>
    </div>
  </div>
</section>

<section id="view-dashboard" class="hidden h-screen flex flex-col overflow-y-auto">
  <div id="event-banner" class="hidden bg-red-600 p-2 text-center text-[10px] font-black uppercase animate-pulse"></div>

  <header class="p-6 flex justify-between items-center">
    <div id="clan-indicator" class="w-16 h-16 rounded-full border-4 flex items-center justify-center text-2xl font-black">?</div>
    <div class="text-right">
      <p class="text-[10px] uppercase opacity-50 font-bold">Total Clan Points</p>
      <p id="score-display" class="text-3xl font-black text-white">0</p>
    </div>
  </header>

  <main class="flex-1 p-6 space-y-6">
    <div id="tracking-card" class="bg-slate-800 p-8 rounded-[2.5rem] text-center border border-slate-700 shadow-2xl transition-all">
      <p id="tracking-status" class="text-[10px] uppercase tracking-widest opacity-40 font-bold mb-6">Scanner Ready</p>
      
      <div class="relative flex justify-center items-center mb-8">
        <div id="radar-ping" class="hidden absolute w-48 h-48 rounded-full border-2 border-l5 animate-ping opacity-20"></div>
        <div class="w-36 h-36 rounded-full border-2 border-slate-700 flex items-center justify-center bg-slate-900/50">
            <div class="flex flex-col items-center">
                <span id="big-points" class="text-4xl font-black">0</span>
                <span class="text-[8px] uppercase opacity-30">Trip Points</span>
            </div>
        </div>
      </div>

      <button onclick="startJourney()" id="btn-main-action" class="btn-active w-full py-5 rounded-2xl bg-l5 text-white font-black text-sm uppercase tracking-widest shadow-lg">
        Start Journey Scan
      </button>
    </div>

    <div id="live-data" class="grid grid-cols-2 gap-4 opacity-20 transition-all duration-500">
        <div class="bg-slate-800/80 p-4 rounded-3xl border border-slate-700 text-center">
            <p class="text-[8px] uppercase opacity-40 font-bold mb-1">Station</p>
            <p id="current-station" class="text-xs font-bold truncate">---</p>
        </div>
        <div class="bg-slate-800/80 p-4 rounded-3xl border border-slate-700 text-center">
            <p class="text-[8px] uppercase opacity-40 font-bold mb-1">Speed</p>
            <p id="speed-display" class="text-xs font-bold">0 km/h</p>
        </div>
    </div>
  </main>
</section>

<script src="app.js"></script>

</body>
</html>
