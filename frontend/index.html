<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro Clan War</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            l1: '#ED1C24',
            l2: '#93278F',
            l3: '#00A651',
            l4: '#FDB913',
            l5: '#005596',
            l7: '#B97D05',
            l9sud: '#F37021',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-900 text-white font-sans overflow-hidden">

<!-- QUIZ -->
<section id="view-quiz" class="h-screen flex flex-col p-6">

  <header class="py-6 text-center">
    <h1 class="text-3xl font-black">
      METRO <span class="text-l5">CLAN</span> WAR
    </h1>
    <p class="text-sm opacity-60 mt-2">Discover your underground faction</p>
  </header>

  <div id="quiz-container" class="flex-1 flex flex-col justify-center">
    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">

      <span class="text-xs text-l5 uppercase">Question</span>
      <h2 class="text-xl font-bold mt-2">Loading...</h2>

      <div class="grid gap-3 mt-6"></div>

    </div>
  </div>
</section>

<!-- RESULT -->
<section id="view-dashboard" class="hidden h-screen flex flex-col">

  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-slate-800 p-8 rounded-3xl text-center border border-slate-700">

      <div id="clan-indicator" class="text-4xl font-black mb-4">?</div>
      <p id="clan-description" class="opacity-70"></p>

    </div>
  </div>

</section>

<script>
const questions = [
  {
    text: "What is your love language?",
    answers: {
      a: { text: "Physical touch", clan: "L1" },
      b: { text: "Gift giving", clan: "L7" },
      c: { text: "Words of affirmation", clan: "L9sud" },
      d: { text: "Acts of service", clan: "L5" },
      e: { text: "Quality time", clan: "L4" },
      f: { text: "Emotional connection", clan: "L2" },
      g: { text: "Personal growth support", clan: "L3" }
    }
  },
  {
    text: "What is your favorite type of pasta?",
    answers: {
      a: { text: "Spaghetti", clan: "L5" },
      b: { text: "Tortellini", clan: "L2" },
      c: { text: "Fettuccine", clan: "L7" },
      d: { text: "Penne", clan: "L3" },
      e: { text: "Ravioli", clan: "L1" },
      f: { text: "Rigatoni", clan: "L4" },
      g: { text: "Farfalle", clan: "L9sud" }
    }
  },
  {
    text: "Someone is following you at night, you…",
    answers: {
      a: { text: "Act crazy to scare them away", clan: "L4" },
      b: { text: "Ignore them and keep walking", clan: "L9sud" },
      c: { text: "Run away as fast as possible", clan: "L3" },
      d: { text: "Face them", clan: "L1" },
      e: { text: "Start following them", clan: "L2" },
      f: { text: "Walk in circles", clan: "L5" },
      g: { text: "Call the police", clan: "L7" }
    }
  },
  {
    text: "Which animal represents you best?",
    answers: {
      a: { text: "Pigeon", clan: "L1" },
      b: { text: "Jellyfish", clan: "L2" },
      c: { text: "Rhino", clan: "L1" },
      d: { text: "Horseshoe crab", clan: "L3" },
      e: { text: "Hyena", clan: "L4" },
      f: { text: "King cobra", clan: "L7" },
      g: { text: "White shark", clan: "L9sud" }
    }
  },
  {
    text: "Among these, which is your favorite metro line?",
    answers: {
      a: { text: "L1", clan: "L3" },
      b: { text: "L2", clan: "L5" },
      c: { text: "L3", clan: "L1" },
      d: { text: "L4", clan: "L2" },
      e: { text: "L5", clan: "L9sud" },
      f: { text: "L7", clan: "L7" },
      g: { text: "L9 Sud", clan: "L4" }
    }
  }
];

let currentQuestion = 0;
let scores = { L1:0, L2:0, L3:0, L4:0, L5:0, L7:0, L9sud:0 };

function loadQuestion() {
  const q = questions[currentQuestion];
  document.querySelector("h2").textContent = q.text;

  const container = document.querySelector(".grid");
  container.innerHTML = "";

  Object.entries(q.answers).forEach(([key, value]) => {
    const btn = document.createElement("button");

    btn.className = "w-full p-4 bg-slate-700 hover:bg-slate-600 rounded-2xl text-left";

    btn.innerHTML = `<span class="font-bold mr-2 text-l5">${key.toUpperCase()}</span> ${value.text}`;

    btn.onclick = () => selectAnswer(value.clan);

    container.appendChild(btn);
  });
}

function selectAnswer(clan) {
  scores[clan]++;
  currentQuestion++;

  if (currentQuestion < questions.length) {
    loadQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const winner = Object.keys(scores).reduce((a, b) =>
    scores[a] > scores[b] ? a : b
  );

  document.getElementById("clan-indicator").textContent = winner;
  document.getElementById("clan-description").textContent =
    "You belong to line " + winner;

  showView("view-dashboard");
}

function showView(id) {
  document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

document.addEventListener("DOMContentLoaded", loadQuestion);
</script>

</body>
</html>
