<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MetroClanWar — Validator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #111 !important; }
    .ev-row { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
    .ev-ok    { border-left: 3px solid #22c55e; }
    .ev-bad   { border-left: 3px solid #ef4444; }
    .ev-pub   { border-left: 3px solid #fbbf24; }
    .ev-recv  { border-left: 3px solid #6b7280; }
  </style>
</head>
<body class="text-white font-sans overflow-hidden">
  <section class="h-screen flex flex-col p-6 overflow-hidden">
    <header class="flex justify-between items-center mb-4">
      <div>
        <p class="text-[10px] uppercase font-bold tracking-widest opacity-60">Validator peer</p>
        <h1 class="text-2xl font-black italic tracking-tighter">METRO CLAN WAR</h1>
      </div>
      <div class="text-right">
        <p class="text-[10px] uppercase opacity-60">Status</p>
        <p id="v-status" class="text-sm font-bold">desconnectat</p>
      </div>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
      <div class="bg-black/40 rounded-2xl p-4 border border-white/10">
        <p class="text-[10px] uppercase opacity-60">Validator ID</p>
        <p id="v-id" class="font-mono text-xs mt-1 break-all">—</p>
      </div>
      <div class="bg-black/40 rounded-2xl p-4 border border-white/10 flex items-center justify-between">
        <div>
          <p class="text-[10px] uppercase opacity-60">Última publicació</p>
          <p id="v-last-published" class="text-xs mt-1">cap encara</p>
        </div>
        <button id="btn-compute" class="btn-active px-4 py-3 rounded-xl bg-white text-black font-black text-xs uppercase tracking-widest">Compute Weekly</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-4 text-center">
      <div class="bg-black/40 rounded-xl p-3 border border-white/10">
        <p class="text-[10px] uppercase opacity-60">Rebuts</p>
        <p id="v-count-recv" class="text-2xl font-black">0</p>
      </div>
      <div class="bg-green-900/30 rounded-xl p-3 border border-green-500/30">
        <p class="text-[10px] uppercase opacity-60">Acceptats</p>
        <p id="v-count-ok" class="text-2xl font-black text-green-400">0</p>
      </div>
      <div class="bg-red-900/30 rounded-xl p-3 border border-red-500/30">
        <p class="text-[10px] uppercase opacity-60">Rebutjats</p>
        <p id="v-count-bad" class="text-2xl font-black text-red-400">0</p>
      </div>
    </div>

    <div class="flex-1 bg-black/40 rounded-2xl p-4 border border-white/10 overflow-hidden flex flex-col min-h-0">
      <p class="text-[10px] uppercase opacity-60 mb-2">Stream d'events</p>
      <ul id="v-events" class="flex-1 overflow-y-auto space-y-1 pr-2"></ul>
    </div>
  </section>

  <script src="validator-app.js"></script>
</body>
</html>
